name: Charity Engine Bot

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install requests
        run: pip install requests

      - name: Run bot
        run: python bot.py

      - name: Commit and push log
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add charity_log.txt
          git commit -m "Update charity log" || echo "No changes to commit"
          git push
